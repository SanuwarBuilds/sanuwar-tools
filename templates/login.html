<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Instant Photo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #111827; color: #fff; }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div class="bg-gray-800 border border-gray-700 p-8 rounded-2xl shadow-xl w-full max-w-md relative">
    <div class="absolute inset-0 bg-blue-500 blur-[80px] opacity-10 rounded-full z-0 pointer-events-none"></div>
    <div class="relative z-10">
      <h2 class="text-3xl font-bold mb-6 text-center text-blue-400">Admin Login</h2>
      
      <div id="errorMsg" class="hidden bg-red-500/20 text-red-400 border border-red-500/50 p-3 rounded-lg mb-4 text-sm text-center"></div>

      <form id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
          <input type="text" id="username" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
          <input type="password" id="password" class="w-full bg-gray-700 border border-gray-600 rounded-lg p-3 text-white focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg hover:shadow-blue-500/30">
          Sign In
        </button>
      </form>
      <div class="mt-6 text-center">
         <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors">&larr; Back to Main Site</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const btn = e.target.querySelector('button');
      const err = document.getElementById('errorMsg');
      
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      err.classList.add('hidden');

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: user, password: pass })
        });
        
        if (res.ok) {
          window.location.href = '/admin';
        } else {
          const data = await res.json();
          err.textContent = data.error || 'Login failed';
          err.classList.remove('hidden');
        }
      } catch (error) {
        err.textContent = 'Network error. Try again.';
        err.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
