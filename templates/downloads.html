<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Hub — SanuwarTools</title>
  <meta name="description" content="Browse and download apps, albums, and files from SanuwarTools Download Hub.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070b13;
      --bg2: #0d1220;
      --surface: rgba(255,255,255,0.038);
      --surface2: rgba(255,255,255,0.06);
      --surface-hover: rgba(255,255,255,0.075);
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(99,102,241,0.35);
      --text: #eef2ff;
      --text-secondary: #c7d2fe;
      --muted: #718096;
      --accent: #6366f1;
      --accent2: #a855f7;
      --accent3: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --radius-sm: 8px;
      --radius: 14px;
      --radius-lg: 20px;
      --radius-xl: 24px;
      --shadow-accent: 0 0 40px rgba(99,102,241,0.2);
      --transition: all 0.25s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AMBIENT BG ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(80px);
    }
    .bg-orb-1 {
      width: 700px; height: 700px;
      top: -200px; left: -200px;
      background: radial-gradient(circle, rgba(99,102,241,0.14) 0%, transparent 70%);
    }
    .bg-orb-2 {
      width: 600px; height: 600px;
      bottom: -150px; right: -150px;
      background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
    }
    .bg-orb-3 {
      width: 400px; height: 400px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(6,182,212,0.06) 0%, transparent 70%);
    }

    /* ── NAVBAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(7,11,19,0.88);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      text-decoration: none;
      color: var(--text);
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }
    .nav-brand-icon {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: white;
      box-shadow: 0 4px 12px rgba(99,102,241,0.4);
    }
    .nav-search-wrap {
      flex: 1;
      max-width: 380px;
      position: relative;
    }
    .nav-search-wrap i {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.82rem;
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.85rem 0.55rem 2.3rem;
      color: var(--text);
      font-size: 0.87rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: var(--transition);
    }
    #searchInput:focus { border-color: var(--accent); background: var(--surface2); }
    #searchInput::placeholder { color: var(--muted); }
    .nav-right { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
    .nav-count {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 0.4rem;
      text-decoration: none; color: var(--muted);
      font-size: 0.82rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      text-align: center;
      padding: 4rem 1.5rem 2.5rem;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      color: #a5b4fc;
      font-size: 0.78rem; font-weight: 600;
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
      letter-spacing: 0.3px;
    }
    .hero-badge i { font-size: 0.72rem; }
    .hero h1 {
      font-size: clamp(2rem, 5.5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1.1;
      background: linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 40%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.85rem;
    }
    .hero-sub {
      color: var(--muted);
      font-size: 1rem;
      max-width: 460px;
      margin: 0 auto 0;
      line-height: 1.6;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      gap: 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }
    .stat-chip {
      display: flex; align-items: center; gap: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.6rem 1.1rem;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .stat-chip-icon { font-size: 0.95rem; }
    .stat-chip-val { font-size: 1.05rem; font-weight: 700; }
    .stat-chip-label { font-size: 0.75rem; color: var(--muted); }

    /* ── CATEGORY PILLS ── */
    .cats-outer {
      position: sticky; top: 64px; z-index: 150;
      background: rgba(7,11,19,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .cats-wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.75rem 1.5rem;
    }
    .cats {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .cats::-webkit-scrollbar { display: none; }
    .pill {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.42rem 1.05rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
      display: flex; align-items: center; gap: 0.4rem;
      font-family: 'Inter', sans-serif;
    }
    .pill:hover { background: var(--surface2); color: var(--text); border-color: var(--border-accent); }
    .pill.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.22), rgba(168,85,247,0.22));
      border-color: var(--accent);
      color: #a5b4fc;
      font-weight: 600;
    }
    .pill .cat-count {
      background: rgba(255,255,255,0.1);
      font-size: 0.7rem;
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 600;
    }
    .pill.active .cat-count { background: rgba(99,102,241,0.3); }

    /* ── SORT & VIEW BAR ── */
    .toolbar {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .toolbar-title { font-size: 0.85rem; color: var(--muted); }
    .toolbar-title strong { color: var(--text); font-weight: 700; }
    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.82rem;
      padding: 0.4rem 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      font-family: 'Inter', sans-serif;
    }

    /* ── GRID ── */
    .grid-wrap {
      position: relative; z-index: 1;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0.5rem 1.5rem 5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1), box-shadow 0.3s, border-color 0.3s;
      position: relative;
      cursor: default;
    }
    .card:hover {
      transform: translateY(-6px);
      border-color: var(--border-accent);
      box-shadow: 0 24px 48px rgba(0,0,0,0.45), 0 0 0 1px rgba(99,102,241,0.12), var(--shadow-accent);
    }
    /* Card glow on hover */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(99,102,241,0.04) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .card:hover::before { opacity: 1; }

    .card-img-wrap {
      height: 176px;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      position: relative;
      flex-shrink: 0;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .card:hover .card-img-wrap img { transform: scale(1.07); }
    .card-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem;
      color: rgba(255,255,255,0.05);
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(7,11,19,0.6) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Badges */
    .card-badges {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      backdrop-filter: blur(8px);
    }
    .badge-cat { background: rgba(99,102,241,0.85); color: white; }
    .badge-album { background: rgba(168,85,247,0.85); color: white; }
    .badge-app { background: rgba(16,185,129,0.85); color: white; }
    .badge-new {
      background: rgba(245,158,11,0.9); color: white;
      animation: pulse-badge 2s infinite;
    }
    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    /* Card body */
    .card-body {
      padding: 1.15rem 1.15rem 1.25rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      gap: 0.55rem;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .tag-version { color: #a5b4fc; border-color: rgba(99,102,241,0.25); background: rgba(99,102,241,0.08); }
    .tag-files { color: #c4b5fd; border-color: rgba(168,85,247,0.25); background: rgba(168,85,247,0.08); }
    .tag-size { color: #6ee7b7; border-color: rgba(16,185,129,0.25); background: rgba(16,185,129,0.08); }

    .card-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      line-height: 1.3;
      margin: 0;
    }
    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }

    /* Download button */
    .btn-dl {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      font-size: 0.87rem;
      font-weight: 600;
      transition: var(--transition);
      cursor: pointer;
      border: none;
      text-decoration: none;
      width: 100%;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }
    .btn-dl::after {
      content: '';
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-dl:hover::after { opacity: 0.06; }
    .btn-download {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }
    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.5);
    }
    .btn-album {
      background: linear-gradient(135deg, #7c3aed, var(--accent2));
      color: white;
      box-shadow: 0 4px 16px rgba(168,85,247,0.35);
    }
    .btn-album:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(168,85,247,0.5);
    }
    .btn-dl.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    /* ── SKELETON LOADER ── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.05) 50%, var(--surface) 75%);
      background-size: 200%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-card { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border); }
    .skeleton-img { height: 176px; }
    .skeleton-body { padding: 1.15rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .skeleton-line { border-radius: 4px; }

    /* ── EMPTY / ERROR STATE ── */
    .state-card {
      grid-column: 1 / -1;
      text-align: center;
      padding: 5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .state-icon {
      width: 80px; height: 80px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .state-card h3 { font-size: 1.1rem; font-weight: 700; }
    .state-card p { color: var(--muted); font-size: 0.88rem; max-width: 320px; line-height: 1.6; }
    .state-card .state-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .state-card .state-btn:hover { border-color: var(--border-accent); background: var(--surface-hover); }

    /* ── ALBUM MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 500;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-sheet {
      background: #0f172a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px 28px 0 0;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      transform: translateY(60px);
      transition: transform 0.4s cubic-bezier(.4,0,.2,1);
      box-shadow: 0 -24px 80px rgba(0,0,0,0.6);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }
    .modal-pull {
      width: 40px; height: 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      margin: 12px auto 0;
      flex-shrink: 0;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem 0.85rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-head-info { display: flex; flex-direction: column; gap: 0.2rem; }
    .modal-head h3 { font-weight: 800; font-size: 1.05rem; }
    .modal-head-sub { font-size: 0.78rem; color: var(--muted); }
    .modal-close {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      font-size: 1rem;
    }
    .modal-close:hover { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.3); }
    .modal-body {
      overflow-y: auto;
      padding: 1rem 1.25rem 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 0.85rem;
      flex: 1;
    }
    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .album-file {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: var(--transition);
    }
    .album-file:hover { border-color: var(--border-accent); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .album-file-thumb {
      height: 108px;
      overflow: hidden;
      background: #1a2035;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .album-file-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
    .album-file:hover .album-file-thumb img { transform: scale(1.05); }
    .album-file-thumb .file-icon {
      font-size: 2.2rem; color: var(--muted); opacity: 0.35;
    }
    .album-file-thumb .file-type-badge {
      position: absolute; bottom: 6px; right: 6px;
      background: rgba(0,0,0,0.7);
      color: #a5b4fc; font-size: 0.6rem; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; text-transform: uppercase;
    }
    .album-file-info { padding: 0.6rem 0.65rem 0.7rem; }
    .album-file-name {
      font-size: 0.72rem; color: var(--text-secondary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 0.5rem; font-weight: 500;
    }
    .album-file-dl {
      display: flex; align-items: center; justify-content: center; gap: 0.35rem;
      text-align: center;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 0.74rem; font-weight: 600;
      padding: 6px;
      border-radius: 7px;
      border: none; width: 100%;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .album-file-dl:hover { opacity: 0.875; transform: translateY(-1px); }

    /* Download progress toast */
    #dl-toast {
      position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e2740;
      border: 1px solid rgba(99,102,241,0.3);
      color: var(--text);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.6rem;
      z-index: 1000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.35s;
      opacity: 0;
    }
    #dl-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    #dl-toast .dl-toast-icon { font-size: 1rem; }
    #dl-toast.success .dl-toast-icon { color: var(--green); }
    #dl-toast.error .dl-toast-icon { color: var(--red); }
    #dl-toast.loading .dl-toast-icon { color: var(--accent); animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FLOATING SEARCH (MOBILE) ── */
    .mobile-search-bar {
      display: none;
      position: sticky; top: 64px; z-index: 140;
      padding: 0.6rem 1rem;
      background: rgba(7,11,19,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .mobile-search-bar input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.55rem 0.85rem 0.55rem 2.1rem;
      color: var(--text);
      font-size: 0.87rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .mobile-search-bar { position: relative; }
    .msb-wrap { position: relative; }
    .msb-wrap i {
      position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 0.8rem; pointer-events: none;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .nav-search-wrap { display: none; }
      .mobile-search-bar { display: block; }
      .cats-outer { top: 64px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 0.85rem; }
      .card-img-wrap { height: 150px; }
      .hero { padding: 2.5rem 1rem 1.75rem; }
      .toolbar { padding: 0.85rem 1rem 0.5rem; }
      .grid-wrap { padding: 0.5rem 1rem 4rem; }
      .stats-bar { padding: 0.75rem 1rem; gap: 0.75rem; }
      .modal-body { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
    @media (max-width: 420px) {
      .grid { grid-template-columns: 1fr; }
      .hero h1 { letter-spacing: -0.5px; }
    }
  </style>
</head>
<body>

<!-- Ambient bg -->
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="bg-orb bg-orb-3"></div>

<!-- Navbar -->
<nav>
  <div class="nav-inner">
    <a href="/" class="nav-brand">
      <div class="nav-brand-icon"><i class="fa-solid fa-store"></i></div>
      SanuwarTools
    </a>
    <div class="nav-search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search apps, albums, files..." autocomplete="off" oninput="onSearch(this.value)">
    </div>
    <div class="nav-right">
      <span class="nav-count" id="itemCount">Loading...</span>
      <a href="/" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Home</a>
    </div>
  </div>
</nav>

<!-- Mobile search -->
<div class="mobile-search-bar">
  <div class="msb-wrap">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="mobileSearch" placeholder="Search apps, albums, files..." oninput="onSearch(this.value)">
  </div>
</div>

<!-- Hero -->
<section class="hero">
  <div class="hero-badge">
    <i class="fa-solid fa-bolt"></i>
    SanuwarTools Hub
  </div>
  <h1>Download Hub</h1>
  <p class="hero-sub">Apps, albums, and files — curated in one place. Instant downloads, no hassle.</p>
</section>

<!-- Stats bar -->
<div class="stats-bar" id="statsBar"></div>

<!-- Category pills (sticky) -->
<div class="cats-outer">
  <div class="cats-wrap">
    <div class="cats" id="catBar"></div>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <div class="toolbar-title" id="toolbarTitle">Loading items...</div>
  <select class="sort-select" id="sortSelect" onchange="onSort(this.value)">
    <option value="default">Default Order</option>
    <option value="alpha">A → Z</option>
    <option value="alpha-desc">Z → A</option>
    <option value="albums-first">Albums First</option>
    <option value="apps-first">Apps First</option>
  </select>
</div>

<!-- Grid -->
<div class="grid-wrap">
  <div class="grid" id="grid">
    <!-- Skeleton -->
    <div class="skeleton-card skeleton-img skeleton" style="height:176px; border-radius:20px;"></div>
    <div class="skeleton-card skeleton-img skeleton" style="height:176px; border-radius:20px;"></div>
    <div class="skeleton-card skeleton-img skeleton" style="height:176px; border-radius:20px;"></div>
    <div class="skeleton-card skeleton-img skeleton" style="height:176px; border-radius:20px;"></div>
    <div class="skeleton-card skeleton-img skeleton" style="height:176px; border-radius:20px;"></div>
    <div class="skeleton-card skeleton-img skeleton" style="height:176px; border-radius:20px;"></div>
  </div>
</div>

<!-- Album Modal -->
<div class="modal-overlay" id="albumModal" onclick="handleModalClick(event)">
  <div class="modal-sheet">
    <div class="modal-pull"></div>
    <div class="modal-head">
      <div class="modal-head-info">
        <h3 id="albumModalTitle">Album</h3>
        <span class="modal-head-sub" id="albumModalSub"></span>
      </div>
      <button class="modal-close" onclick="closeAlbumModal()"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="albumModalBody"></div>
  </div>
</div>

<!-- Download toast -->
<div id="dl-toast">
  <i class="fa-solid fa-circle-notch dl-toast-icon"></i>
  <span id="dl-toast-msg">Preparing download...</span>
</div>

<script>
  // ── STATE ───────────────────────────────────────────
  let allItems = [];
  let filteredItems = [];
  let currentCat = 'All';
  let currentSearch = '';
  let currentSort = 'default';

  // ── TOAST ───────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, type = 'loading') {
    const el = document.getElementById('dl-toast');
    const msgEl = document.getElementById('dl-toast-msg');
    const icon = el.querySelector('.dl-toast-icon');

    el.className = `show ${type}`;
    msgEl.textContent = msg;

    // Icon class
    if (type === 'loading') icon.className = 'fa-solid fa-circle-notch dl-toast-icon fa-spin';
    else if (type === 'success') icon.className = 'fa-solid fa-check-circle dl-toast-icon';
    else if (type === 'error') icon.className = 'fa-solid fa-triangle-exclamation dl-toast-icon';

    clearTimeout(toastTimer);
    if (type !== 'loading') {
      toastTimer = setTimeout(() => { el.className = ''; }, 3500);
    }
  }
  function hideToast() { document.getElementById('dl-toast').className = ''; }

  // ── DATA LOADING ────────────────────────────────────
  async function loadData() {
    try {
      const res = await fetch('/api/downloads_data?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      allItems = await res.json();

      // Ensure all have IDs
      allItems.forEach((item, i) => {
        if (!item.id) item.id = 'item_' + i;
        if (!item.album_files) item.album_files = [];
      });

      buildStats();
      buildCats();
      applyFilters();
    } catch (e) {
      document.getElementById('grid').innerHTML = `
        <div class="state-card">
          <div class="state-icon">⚡</div>
          <h3>Failed to load</h3>
          <p>Couldn't connect to the server. Make sure the backend is running.</p>
          <button class="state-btn" onclick="loadData()"><i class="fa-solid fa-rotate-right"></i> Retry</button>
        </div>`;
      document.getElementById('itemCount').textContent = 'Error';
    }
  }

  // ── STATS BAR ───────────────────────────────────────
  function buildStats() {
    const total = allItems.length;
    const albums = allItems.filter(i => i.is_album).length;
    const apps = allItems.filter(i => !i.is_album).length;
    const cats = new Set(allItems.map(i => i.category)).size;

    const bar = document.getElementById('statsBar');
    bar.innerHTML = [
      { icon: '📦', val: total, label: 'Total Items' },
      { icon: '📱', val: apps, label: 'Files & Apps' },
      { icon: '🗂️', val: albums, label: 'Albums' },
      { icon: '🏷️', val: cats, label: 'Categories' },
    ].map(s => `
      <div class="stat-chip">
        <span class="stat-chip-icon">${s.icon}</span>
        <span class="stat-chip-val">${s.val}</span>
        <span class="stat-chip-label">${s.label}</span>
      </div>`).join('');
  }

  // ── CATEGORY ────────────────────────────────────────
  function buildCats() {
    const catCounts = {};
    allItems.forEach(i => {
      const c = i.category || 'Other';
      catCounts[c] = (catCounts[c] || 0) + 1;
    });
    const cats = ['All', ...Object.keys(catCounts)];

    const bar = document.getElementById('catBar');
    bar.innerHTML = cats.map(c => {
      const count = c === 'All' ? allItems.length : catCounts[c];
      return `<button class="pill${c === currentCat ? ' active' : ''}" onclick="filterCat('${CSS.escape(c)}')" data-cat="${c}">
        ${c} <span class="cat-count">${count}</span>
      </button>`;
    }).join('');
  }

  window.filterCat = function(cat) {
    // Find the actual cat value from data-cat attribute
    const btn = document.querySelector(`.pill[data-cat="${cat}"]`);
    const actualCat = btn ? btn.dataset.cat : cat;
    currentCat = actualCat;
    document.querySelectorAll('.pill').forEach(p =>
      p.classList.toggle('active', p.dataset.cat === actualCat)
    );
    applyFilters();
  };

  // ── SEARCH ──────────────────────────────────────────
  function onSearch(q) {
    currentSearch = q.trim().toLowerCase();
    // Sync both search inputs
    if (document.getElementById('searchInput').value !== q)
      document.getElementById('searchInput').value = q;
    if (document.getElementById('mobileSearch').value !== q)
      document.getElementById('mobileSearch').value = q;
    applyFilters();
  }

  // ── SORT ────────────────────────────────────────────
  function onSort(val) {
    currentSort = val;
    applyFilters();
  }

  // ── FILTER + RENDER PIPELINE ─────────────────────────
  function applyFilters() {
    let items = [...allItems];

    // Category
    if (currentCat !== 'All') {
      items = items.filter(i => (i.category || 'Other') === currentCat);
    }

    // Search
    if (currentSearch) {
      items = items.filter(i =>
        (i.title + ' ' + i.description + ' ' + i.category + ' ' + (i.tags || []).join(' '))
          .toLowerCase().includes(currentSearch)
      );
    }

    // Sort
    if (currentSort === 'alpha') items.sort((a, b) => a.title.localeCompare(b.title));
    else if (currentSort === 'alpha-desc') items.sort((a, b) => b.title.localeCompare(a.title));
    else if (currentSort === 'albums-first') items.sort((a, b) => (b.is_album ? 1 : 0) - (a.is_album ? 1 : 0));
    else if (currentSort === 'apps-first') items.sort((a, b) => (a.is_album ? 1 : 0) - (b.is_album ? 1 : 0));

    filteredItems = items;

    const countStr = items.length === allItems.length
      ? `<strong>${items.length}</strong> items`
      : `<strong>${items.length}</strong> of ${allItems.length} items`;
    document.getElementById('toolbarTitle').innerHTML = `Showing ${countStr}`;
    document.getElementById('itemCount').textContent = `${allItems.length} items`;

    render(items);
  }

  // ── RENDER GRID ─────────────────────────────────────
  function render(items) {
    const grid = document.getElementById('grid');

    if (!items || !items.length) {
      grid.innerHTML = `
        <div class="state-card">
          <div class="state-icon">🔍</div>
          <h3>No results found</h3>
          <p>Try a different search term or category.</p>
          <button class="state-btn" onclick="clearSearch()"><i class="fa-solid fa-xmark"></i> Clear Filters</button>
        </div>`;
      return;
    }

    grid.style.opacity = '0';
    grid.innerHTML = items.map(item => buildCard(item)).join('');
    requestAnimationFrame(() => {
      grid.style.transition = 'opacity 0.4s ease';
      grid.style.opacity = '1';
    });
  }

  function buildCard(item) {
    // Thumbnail
    const thumb = item.image
      ? `<img src="${item.image}" alt="${escHtml(item.title)}" loading="lazy">`
      : `<div class="card-placeholder"><i class="fa-solid ${item.is_album ? 'fa-images' : 'fa-box-archive'}"></i></div>`;

    // Badges
    const badges = [];
    if (item.is_album) badges.push(`<span class="badge badge-album"><i class="fa-solid fa-images"></i> Album</span>`);
    else if (item.category) badges.push(`<span class="badge badge-cat">${escHtml(item.category)}</span>`);

    // Is it new? (optional: check date added within 7 days)
    if (item.is_new) badges.push(`<span class="badge badge-new">New</span>`);

    // Tags
    const tags = [];
    if (item.version) tags.push(`<span class="tag tag-version">v${escHtml(item.version)}</span>`);
    if (item.is_album) tags.push(`<span class="tag tag-files"><i class="fa-solid fa-file" style="font-size:0.65rem"></i> ${item.album_files.length} files</span>`);

    // Button
    const btn = item.is_album
      ? `<button class="btn-dl btn-album" onclick="openAlbumModal('${item.id}')">
           <i class="fa-solid fa-folder-open"></i> View Album
         </button>`
      : `<button class="btn-dl btn-download" onclick="smartDownload(this, '${escAttr(item.link)}', '${escAttr(item.title)}')">
           <i class="fa-solid fa-cloud-arrow-down"></i> Download
         </button>`;

    return `
      <article class="card">
        <div class="card-img-wrap">
          ${thumb}
          <div class="card-overlay"></div>
          <div class="card-badges">${badges.join('')}</div>
        </div>
        <div class="card-body">
          <div class="card-meta">${tags.join('')}</div>
          <h2 class="card-title">${escHtml(item.title)}</h2>
          ${item.description ? `<p class="card-desc">${escHtml(item.description)}</p>` : ''}
          ${btn}
        </div>
      </article>`;
  }

  function clearSearch() {
    currentSearch = '';
    currentCat = 'All';
    document.getElementById('searchInput').value = '';
    document.getElementById('mobileSearch').value = '';
    document.querySelectorAll('.pill').forEach(p =>
      p.classList.toggle('active', p.dataset.cat === 'All')
    );
    applyFilters();
  }

  // ── ALBUM MODAL ─────────────────────────────────────
  window.openAlbumModal = function(id) {
    const item = allItems.find(x => x.id === id);
    if (!item) return;

    document.getElementById('albumModalTitle').textContent = item.title;
    document.getElementById('albumModalSub').textContent = `${item.album_files.length} files in this album`;

    const body = document.getElementById('albumModalBody');
    if (!item.album_files.length) {
      body.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--muted);">This album is empty.</div>`;
    } else {
      body.innerHTML = item.album_files.map((f, idx) => {
        const link = processUrl(f.link || '');
        const name = f.name || `File ${idx + 1}`;
        const ext = (name.split('.').pop() || '').toUpperCase();
        const isImg = /^(JPG|JPEG|PNG|GIF|WEBP|SVG|AVIF)$/i.test(ext);
        const isPdf = ext === 'PDF';
        const isApk = ext === 'APK';

        const thumb = isImg
          ? `<img src="${f.link}" alt="${escHtml(name)}" loading="lazy">`
          : `<div class="file-icon"><i class="fa-solid ${isPdf ? 'fa-file-pdf' : isApk ? 'fa-android fa-brands' : 'fa-file'}"></i></div>`;

        return `
          <div class="album-file">
            <div class="album-file-thumb">
              ${thumb}
              ${ext ? `<span class="file-type-badge">${ext}</span>` : ''}
            </div>
            <div class="album-file-info">
              <div class="album-file-name" title="${escHtml(name)}">${escHtml(name)}</div>
              <button class="album-file-dl" onclick="smartDownload(this, '${escAttr(link)}', '${escAttr(name)}')">
                <i class="fa-solid fa-download"></i> Download
              </button>
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('albumModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeAlbumModal = function() {
    document.getElementById('albumModal').classList.remove('open');
    document.body.style.overflow = '';
  };

  window.handleModalClick = function(e) {
    if (e.target === document.getElementById('albumModal')) closeAlbumModal();
  };

  // ── SMART URL PROCESSING ─────────────────────────────
  function processUrl(url) {
    if (!url) return '';
    // Cloudinary: force attachment header
    if (url.includes('res.cloudinary.com') && url.includes('/upload/') && !url.includes('fl_attachment')) {
      return url.replace('/upload/', '/upload/fl_attachment/');
    }
    return url;
  }

  // ── SMART DOWNLOAD ───────────────────────────────────
  window.smartDownload = async function(btn, rawUrl, defaultName) {
    if (!rawUrl) {
      showToast('No download URL provided', 'error');
      return;
    }

    const oldHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Downloading...';
    btn.classList.add('loading');
    showToast('Preparing download...', 'loading');

    try {
      // Strategy 1: GitHub raw URLs → direct anchor download (no CORS)
      if (rawUrl.includes('raw.githubusercontent.com')) {
        const filename = extractFilename(rawUrl) || defaultName || 'download';
        triggerAnchorDownload(rawUrl, filename);
        showToast(`Downloading ${filename}`, 'success');
        return;
      }

      // Strategy 2: Cloudinary → process URL then fetch+blob
      if (rawUrl.includes('res.cloudinary.com')) {
        const url = processUrl(rawUrl);
        await fetchAndDownload(url, defaultName);
        return;
      }

      // Strategy 3: Other URLs → try fetch+blob, fallback to anchor
      try {
        await fetchAndDownload(rawUrl, defaultName);
      } catch {
        showToast('Opening in new tab...', 'loading');
        window.open(rawUrl, '_blank');
        showToast('Opened in new tab', 'success');
      }

    } catch (err) {
      showToast('Download failed — opening link', 'error');
      window.open(rawUrl, '_blank');
    } finally {
      btn.innerHTML = oldHtml;
      btn.classList.remove('loading');
    }
  };

  async function fetchAndDownload(url, defaultName) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const blob = await res.blob();
    const blobUrl = URL.createObjectURL(blob);
    const filename = extractFilename(url) || defaultName || 'download';
    triggerAnchorDownload(blobUrl, filename);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
    showToast(`Downloaded: ${filename}`, 'success');
  }

  function triggerAnchorDownload(url, filename) {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.rel = 'noopener noreferrer';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function extractFilename(url) {
    try {
      const u = new URL(url);
      const parts = u.pathname.split('/').filter(Boolean);
      const last = parts[parts.length - 1];
      // Strip query / hash junk
      return decodeURIComponent(last.split('?')[0].split('#')[0]) || null;
    } catch {
      return null;
    }
  }

  // ── ESCAPE HELPERS ───────────────────────────────────
  function escHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function escAttr(str) {
    return String(str || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
  }

  // ── INIT ─────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    loadData();

    // Escape key closes modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeAlbumModal();
    });
  });
</script>

</body>
</html>
