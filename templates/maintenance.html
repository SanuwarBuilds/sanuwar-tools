<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance - Instant Photo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #111827; }
    
    @keyframes pulse-ring {
      0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
      100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .gear-icon { animation: rotate 4s linear infinite; }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white p-6 relative overflow-hidden">
  
  <!-- Ambient background glow -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-red-600/20 blur-[100px] rounded-full point-events-none"></div>

  <div class="max-w-md w-full text-center relative z-10">
    <div class="bg-gray-800/80 backdrop-blur-sm border border-gray-700 p-10 rounded-3xl shadow-2xl flex flex-col items-center">
      
      <div class="w-24 h-24 bg-red-500/10 rounded-full flex items-center justify-center mb-6 relative" style="animation: pulse-ring 2s infinite">
        <svg class="w-12 h-12 text-red-500 gear-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
      </div>

      <h1 class="text-3xl font-bold mb-4">Under Maintenance</h1>
      <p class="text-gray-400 text-lg mb-8 leading-relaxed">
        {{ message | default('The server is currently down for maintenance. We will be back shortly.') }}
      </p>

      <div class="h-1 w-16 bg-red-500/50 rounded-full"></div>
    </div>
  </div>

</body>
</html>
